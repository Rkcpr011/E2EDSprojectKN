<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Math Score</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: white;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 500;
        }
        select, input {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        select:focus, input:focus {
            border-color: #6366f1;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #4f46e5; }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #0f172a;
            border-radius: 10px;
            border-left: 4px solid #6366f1;
            text-align: center;
        }
        .result p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 6px; }
        .result h3 { font-size: 2.2rem; color: #6366f1; font-weight: 700; }
        a.back {
            display: inline-block;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.875rem;
        }
        a.back:hover { color: #94a3b8; }
    </style>
</head>
<body>
<div class="card">
    <h2>📊 Predict Math Score</h2>
    <p class="subtitle">Fill in student details to get predicted math score</p>

    <form action="/predictdata" method="post">

        <div class="row">
            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Race / Ethnicity</label>
                <select name="ethnicity">
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education">
                <option value="some high school">Some High School</option>
                <option value="high school">High School</option>
                <option value="some college">Some College</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="master's degree">Master's Degree</option>
            </select>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Lunch</label>
                <select name="lunch">
                    <option value="standard">Standard</option>
                    <option value="free/reduced">Free / Reduced</option>
                </select>
            </div>
            <div class="form-group">
                <label>Test Preparation Course</label>
                <select name="test_preparation_course">
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Reading Score (0-100)</label>
                <input type="number" name="reading_score" min="0" max="100" placeholder="e.g. 72" required>
            </div>
            <div class="form-group">
                <label>Writing Score (0-100)</label>
                <input type="number" name="writing_score" min="0" max="100" placeholder="e.g. 74" required>
            </div>
        </div>

        <button type="submit">Predict Math Score</button>
    </form>

    {% if results is not none %}
    <div class="result">
        <p>Predicted Math Score</p>
        <h3>{{ results }} / 100</h3>
    </div>
    {% endif %}

    <a class="back" href="/">← Back to Home</a>
</div>
</body>
</html>
